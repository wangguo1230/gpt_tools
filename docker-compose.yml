services:
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/wangguo1230/gpt_tools/gpt-tools-backend:latest}
    restart: unless-stopped
    environment:
      GPT_TOOLS_BACKEND_HOST: 0.0.0.0
      GPT_TOOLS_BACKEND_PORT: "18777"
      GPT_TOOLS_BACKEND_RELOAD: "0"
      GPT_TOOLS_CORS_ORIGINS: ${GPT_TOOLS_CORS_ORIGINS:-http://localhost:8080}
      GPT_TOOLS_DATABASE_URL: ${GPT_TOOLS_DATABASE_URL:-sqlite:////app/data/gpt_tools.db}
    volumes:
      - gpt_tools_data:/app/data
    ports:
      - "${BACKEND_PORT:-18777}:18777"

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/wangguo1230/gpt_tools/gpt-tools-frontend:latest}
    restart: unless-stopped
    environment:
      NGINX_PORT: ${NGINX_PORT:-80}
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:${NGINX_PORT:-80}"

volumes:
  gpt_tools_data:
