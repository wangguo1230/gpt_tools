name: 发布镜像到 GHCR

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    name: 构建并发布 ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: gpt-tools-backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
            platforms: linux/amd64,linux/arm64
          - image: gpt-tools-frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            platforms: linux/amd64

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 准备多架构构建
        uses: docker/setup-buildx-action@v3

      - name: 计算镜像命名空间
        run: |
          echo "IMAGE_NAMESPACE=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 生成镜像标签
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=${{ matrix.image }}
            org.opencontainers.image.description=GPT Tools 镜像
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: 构建并发布镜像
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
